{{- range $name, $svc := .Values.rustServices }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apex-{{ $name }}
  labels:
    app: apex-{{ $name }}
    tier: backend
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: apex-{{ $name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: apex-{{ $name }}
        tier: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ $svc.port }}"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.global.image.repository }}/{{ $name }}-rs:{{ $.Values.global.image.tag }}"
          imagePullPolicy: {{ $.Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
              name: http
          env:
            - name: SERVICE_NAME
              value: {{ $name }}
            - name: SERVICE_PORT
              value: "{{ $svc.port }}"
            - name: RUST_LOG
              value: {{ $svc.logLevel }}
            - name: LOG_FORMAT
              value: json
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $.Values.global.otelExporterEndpoint }}
            - name: REDIS_URL
              value: {{ $.Values.global.redisUrl }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: apex-secrets
                  key: databaseUrl
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
{{- end }}

{{- range $name, $svc := .Values.nodeServices }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: apex-{{ $name }}
  labels:
    app: apex-{{ $name }}
    tier: frontend
spec:
  replicas: {{ $svc.replicas }}
  selector:
    matchLabels:
      app: apex-{{ $name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: apex-{{ $name }}
        tier: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ $svc.port }}"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.global.image.repository }}/{{ $name }}:{{ $.Values.global.image.tag }}"
          imagePullPolicy: {{ $.Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
              name: http
          env:
            - name: SERVICE_NAME
              value: {{ $name }}
            - name: PORT
              value: "{{ $svc.port }}"
            - name: NODE_ENV
              value: production
            - name: LOG_LEVEL
              value: info
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $.Values.global.otelExporterEndpoint }}
            - name: REDIS_URL
              value: {{ $.Values.global.redisUrl }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: apex-secrets
                  key: databaseUrl
            {{- if $svc.env }}
            {{- range $k, $v := $svc.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
{{- end }}
