global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: apex-v3
    replica: '{{.ExternalURL}}'

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # APEX Services
  - job_name: 'apex-api'
    static_configs:
      - targets: ['api:3000']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'apex-orchestrator'
    static_configs:
      - targets: ['orchestrator:3001']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'apex-ai-council'
    static_configs:
      - targets: ['ai-council:3002']
    metrics_path: /metrics
    scrape_interval: 10s

  # Rust Services
  - job_name: 'apex-event-bus'
    static_configs:
      - targets: ['event-bus:8080']
    metrics_path: /metrics
    scrape_interval: 5s

  - job_name: 'apex-signal-engine'
    static_configs:
      - targets: ['signal-engine:8081']
    metrics_path: /metrics
    scrape_interval: 5s

  - job_name: 'apex-risk-engine'
    static_configs:
      - targets: ['risk-engine:8082']
    metrics_path: /metrics
    scrape_interval: 5s

  - job_name: 'apex-execution-engine'
    static_configs:
      - targets: ['execution-engine:8083']
    metrics_path: /metrics
    scrape_interval: 5s

  - job_name: 'apex-position-engine'
    static_configs:
      - targets: ['position-engine:8084']
    metrics_path: /metrics
    scrape_interval: 5s

  - job_name: 'apex-portfolio-engine'
    static_configs:
      - targets: ['portfolio-engine:8085']
    metrics_path: /metrics
    scrape_interval: 5s

  # Infrastructure
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 15s

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 15s

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

  # Grafana agent for traces
  - job_name: 'grafana-agent'
    static_configs:
      - targets: ['grafana-agent:12345']
